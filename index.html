<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>convene.md — Medical Conferences Worldwide</title>
  <link rel="icon" href="logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header>
      <div class="brand">
        <div class="logo">
          <svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" aria-label="convene.md logo">
            <path d="M 64 6 C 38 6, 18 24, 18 50 C 18 92, 64 124, 64 124 C 64 124, 110 92, 110 50 C 110 24, 90 6, 64 6 Z" fill="#36b3a8"/>
            <line x1="26" y1="50" x2="102" y2="50" stroke="white" stroke-width="1.6" opacity="0.55"/>
            <path d="M 64 10 Q 34 50 64 90" fill="none" stroke="white" stroke-width="1.6" opacity="0.55"/>
            <rect x="57" y="24" width="14" height="42" fill="white" rx="2"/>
            <rect x="43" y="38" width="42" height="14" fill="white" rx="2"/>
          </svg>
        </div>
        <div>
          <h1>convene.md</h1>
          <div class="subtitle">Where the medical world meets</div>
        </div>
      </div>
      <div class="controls">
        <div class="control">
          <label for="specialty">Specialty</label>
          <select id="specialty"></select>
        </div>
        <div class="control">
          <label for="year">Year</label>
          <select id="year"></select>
        </div>
        <label class="toggle" for="hidePast">
          <input type="checkbox" id="hidePast" checked />
          <span>Hide past events</span>
        </label>
        <div class="count" id="count">Loading…</div>
      </div>
    </header>
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script src="conferences.js"></script>
  <script src="script.js"></script>
</body>
</html>
