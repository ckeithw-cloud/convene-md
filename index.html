<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>convene.md — Medical Conferences Worldwide</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header>
      <div class="brand">
        <div class="logo">C</div>
        <div>
          <h1>convene.md</h1>
          <div class="subtitle">Where the medical world meets</div>
        </div>
      </div>
      <div class="controls">
        <div class="control">
          <label for="specialty">Specialty</label>
          <select id="specialty"></select>
        </div>
        <div class="control">
          <label for="year">Year</label>
          <select id="year"></select>
        </div>
        <label class="toggle" for="hidePast">
          <input type="checkbox" id="hidePast" checked />
          <span>Hide past events</span>
        </label>
        <div class="count" id="count">Loading…</div>
      </div>
    </header>
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script src="conferences.js"></script>
  <script src="script.js"></script>
</body>
</html>
